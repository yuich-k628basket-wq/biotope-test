<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ビオトープ管理士2級 オリジナル50問テスト</title>
<style>
body { font-family: sans-serif; background:#f5f5f5; margin:20px; }
.container { max-width:900px; margin:auto; background:#fff; padding:20px; border-radius:8px; }
h1, h2 { text-align:center; }
.question { border-bottom:1px solid #ddd; padding:15px 0; }
.options label { display:block; margin:4px 0; }
button { padding:10px 20px; font-size:16px; margin-top:20px; cursor:pointer; }
.result { margin-top:20px; padding:15px; border-radius:6px; font-weight:bold; }
.ok { background:#e3f7e3; color:#146314; }
.ng { background:#ffecec; color:#a30000; }
</style>
</head>
<body>
<div class="container">
<h1>ビオトープ管理士2級</h1>
<h2>オリジナル50問テスト</h2>

<div id="questions"></div>

<button onclick="grade()">採点する</button>

<div id="result" class="result" style="display:none;"></div>
<div id="detail" style="white-space:pre-wrap; margin-top:10px;"></div>
</div>

<script>
// ====== ここに50問の問題文と正解を定義 ======
const quiz = [
{q:"生態系における「キーストーン種」の説明として最も適切なのはどれか。",
o:["個体数が最も多い種","生態系に大きな影響を与える種","外来種として侵入しやすい種","遷移初期にのみ見られる種","生態系サービスを提供しない種"],a:2},
{q:"ロジスティック成長で成長が鈍化する理由はどれか。",
o:["捕食者の減少","環境収容力に近づくため","遺伝的多様性の増加","気温の上昇","寿命が延びるため"],a:2},
{q:"ビオトープの基本的な考え方として適切なのはどれか。",
o:["人間利用最優先","特定種のみ保護","生物の生息・生育に配慮","装飾目的の庭園","完全放置区域"],a:3},
{q:"ビオトープネットワーク形成で重要な要素はどれか。",
o:["移動阻害構造物の増加","孤立緑地の増加","コリドーによる連結","外来種導入","舗装率増加"],a:3},
{q:"外来生物法で特定外来生物に指定されるとどうなるか。",
o:["飼育・栽培・運搬・販売が禁止","国が必ず駆除","市町村が保護計画作成","研究利用が自由","自然公園内のみ規制"],a:1},
{q:"環境影響評価法の目的として適切なのはどれか。",
o:["迅速な許可","経済効果算定","環境影響の予測・評価","モニタリング免除","利益最大化"],a:3},
{q:"緑地計画における「エッジ効果」とはどれか。",
o:["端部で多様性低下","端部で多様性上昇","端部が侵食","外来種侵入","乾燥しやすい"],a:2},
{q:"都市部ビオトープで重要な視点はどれか。",
o:["人口密度最大化","生物の移動経路確保","建物高さ均一化","道路幅拡大","公園舗装"],a:2},
{q:"遷移の進行で一般的に見られる傾向はどれか。",
o:["種数減少","生産量減少","土壌が肥沃に","光環境が明るく","pioneer種増加"],a:3},
{q:"アダプティブマネジメントの特徴はどれか。",
o:["計画を変更しない","経験のみで判断","モニタリングで調整","コスト最優先","外来種導入"],a:3},

// ====== 残り40問（問11〜問50） ======
{q:"一次生産者の主な働きはどれか。",o:["分解","光エネルギーを化学エネルギーに","捕食","無機物排出","遷移停止"],a:2},
{q:"ボトルネック効果が起こる原因はどれか。",o:["個体群増加","個体群急減","遺伝子流動増加","生息地拡大","外来種排除"],a:2},
{q:"モザイク構造が重要な理由はどれか。",o:["単一環境維持","多様な生息環境提供","外来種促進","移動阻害","景観均一化"],a:2},
{q:"ビオトープ評価で最も重視される指標はどれか。",o:["人口密度","土地価格","生物多様性","建物高さ","道路幅"],a:3},
{q:"特別保護地区で最も厳しく規制される行為はどれか。",o:["写真撮影","登山","植物採取","道路通行","キャンプ"],a:3},
{q:"生物多様性基本法の理念はどれか。",o:["経済最優先","保全と持続可能な利用","外来種導入","都市化推進","宅地化"],a:2},
{q:"コアエリアの特徴はどれか。",o:["人間利用優先","生物の中心的生息地","外来種区域","交通量多い区域","舗装区域"],a:2},
{q:"バッファーゾーンの役割はどれか。",o:["移動阻害","外部影響から守る","外来種繁殖","都市開発促進","宅地化"],a:2},
{q:"上位捕食者が減少すると起こりやすい現象はどれか。",o:["一次生産者減少","中間捕食者増加","分解者減少","土壌肥沃度上昇","安定化"],a:2},
{q:"刈り取り時期を調整する目的はどれか。",o:["景観均一化","繁殖期への配慮","外来種導入","乾燥促進","水質悪化"],a:2},
{q:"環境基本法の対象はどれか。",o:["経済活動","自然環境と生活環境","都市開発","農業生産","交通インフラ"],a:2},
{q:"ラムサール条約の目的はどれか。",o:["海洋汚染防止","重要湿地の保全","外来種輸入","都市化推進","森林伐採"],a:2},
{q:"雨水貯留池の利点はどれか。",o:["多様性低下","水循環改善","土壌硬化","外来種繁殖","都市熱増加"],a:2},
{q:"モニタリングの目的はどれか。",o:["効果評価と改善","計画固定","外来種導入","景観均一化","利用最大化"],a:1},
{q:"レジリエンスが高い状態とはどれか。",o:["回復力が高い","撹乱に弱い","種数少ない","遺伝多様性低い","サービス提供なし"],a:1},
{q:"生態的ニッチとはどれか。",o:["生活空間の広さ","役割・資源利用範囲","体の大きさ","寿命","移動速度"],a:2},
{q:"質的評価で重視される項目はどれか。",o:["土地価格","生息環境多様性","建物高さ","道路幅","人口密度"],a:2},
{q:"量的評価で重視される項目はどれか。",o:["面積","行動特性","土壌pH","透明度","景観美"],a:1},
{q:"未判定外来生物とはどれか。",o:["特定外来生物","影響不明で評価中","保護対象","絶滅危惧種","在来種"],a:2},
{q:"スクリーニングの目的はどれか。",o:["経済効果評価","アセス必要性判断","利益最大化","外来種導入","都市開発促進"],a:2},
{q:"屋上緑化の役割はどれか。",o:["都市熱増加","生息空間創出","外来種導入","土壌硬化","水質悪化"],a:2},
{q:"ステークホルダー参加が重要な理由はどれか。",o:["透明性と合意形成","計画複雑化","外来種導入","景観均一化","コスト増大"],a:1},
{q:"捕食—被食関係が安定するとどうなるか。",o:["極端に変動","一定範囲で推移","被食者絶滅","捕食者急増","崩壊"],a:2},
{q:"一次遷移が起こる場所はどれか。",o:["伐採地","溶岩地","農地","公園","河川敷"],a:2},
{q:"外来種対策が重要な理由はどれか。",o:["改善する","在来種に影響","保護対象","多様性向上","サービス増加"],a:2},
{q:"連結性が低い場合の問題はどれか。",o:["遺伝多様性低下","移動促進","生息地拡大","多様性増加","安定化"],a:1},
{q:"自然再生推進法の目的はどれか。",o:["復元・再生","都市開発","外来種導入","宅地化","伐採促進"],a:1},
{q:"環境基準の特徴はどれか。",o:["法的拘束力あり","国が達成を目指す目標値","事業者が自由設定","都道府県任意","国民義務"],a:2},
{q:"ゾーニングの目的はどれか。",o:["移動阻害","区域を分ける","外来種導入","景観均一化","都市化推進"],a:2},
{q:"間伐の目的はどれか。",o:["光環境改善","外来種導入","土壌硬化","多様性低下","水質悪化"],a:1},
{q:"分解者の役割はどれか。",o:["無機物化","光合成","捕食","遷移停止","サービス提供なし"],a:1},
{q:"生態系サービスの例はどれか。",o:["土壌形成","都市化","伐採","外来種導入","交通増加"],a:1},
{q:"評価指標として適切なのはどれか。",o:["土地価格","生息環境多様性","建物高さ","道路幅","人口密度"],a:2},
{q:"順応的管理の特徴はどれか。",o:["変更しない","モニタリングで調整","外来種導入","均一化","コスト最優先"],a:2},
{q:"スコーピングの目的はどれか。",o:["項目絞り込み","利益最大化","外来種導入","都市開発","均一化"],a:1},
{q:"特定外来生物の特徴はどれか。",o:["飼育等禁止","保護対象","在来種","絶滅危惧","都市部のみ規制"],a:1},
{q:"ビオトープ池の目的はどれか。",o:["水生生物の生息空間","土壌硬化","外来種導入","都市熱増加","水質悪化"],a:1},
{q:"生態系ネットワークの目的はどれか。",o:["移動促進","移動阻害","外来種導入","均一化","都市化"],a:1},
{q:"遷移のクライマックスとはどれか。",o:["pioneer優占","極相林成立","土壌未発達","生産量低い","多様性最低"],a:2},
{q:"保全優先種の特徴はどれか。",o:["外来種","影響大きい在来種","絶滅のおそれ","都市部のみ","利用価値高い"],a:3}
];

// ====== HTML生成 ======
function loadQuiz(){
  const qDiv=document.getElementById("questions");
  quiz.forEach((item,i)=>{
    let html=`<div class="question"><b>問${i+1}</b><br>${item.q}<br>`;
    item.o.forEach((opt,j)=>{
      html+=`<label><input type="radio" name="q${i}" value="${j+1}"> ${j+1}. ${opt}</label>`;
    });
    html+=`</div>`;
    qDiv.innerHTML+=html;
  });
}
loadQuiz();

// ====== 採点 ======
function grade(){
  let score=0, detail="";
  quiz.forEach((item,i)=>{
    const selected=document.querySelector(`input[name="q${i}"]:checked`);
    const ans=item.a;
    if(!selected){
      detail+=`問${i+1}: 未回答（正解:${ans}）\n`;
    }else if(Number(selected.value)===ans){
      score++;
      detail+=`問${i+1}: 正解\n`;
    }else{
      detail+=`問${i+1}: 不正解（あなた:${selected.value} / 正解:${ans}）\n`;
    }
  });
  const percent=Math.round(score/quiz.length*100);
  const result=document.getElementById("result");
  result.style.display="block";
  result.className="result "+(percent>=60?"ok":"ng");
  result.textContent=`得点: ${score}/${quiz.length}（${percent}%）`;
  document.getElementById("detail").textContent=detail;
}
</script>
</body>
</html>
